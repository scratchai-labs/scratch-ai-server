name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-check:
    name: Workspace Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/server-api/go.mod

      - run: npm ci

      - run: npm run build
        env:
          VITE_SERVER_WEB_API_MODE: real
          VITE_SERVER_WEB_API_BASE_URL: http://localhost:8000

      - run: npm run test
