name: Bug Report
description: 报告可复现的缺陷 / Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，便于不同平台和运行方式排查。
  - type: dropdown
    id: platform
    attributes:
      label: 平台 / Platform
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: affected_area
    attributes:
      label: 受影响区域 / Affected Area
      options:
        - server-api
        - server-web
        - root workspace scripts
        - Both
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题概述 / Summary
      description: 用 1-3 句话说明发生了什么，以及你原本期望什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Reproduction Steps
      description: 按顺序写清楚触发过程，例如先启动哪个服务、访问哪个页面或接口。
      placeholder: |
        1. 运行 `npm run server:dev`
        2. 打开对应的 Web 页面或调用对应的 API
        3. 触发问题
        4. ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 实际结果 / Actual Result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected Result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图 / Logs or Screenshots
      description: 如有日志路径、报错文本、截图，请贴在这里。
