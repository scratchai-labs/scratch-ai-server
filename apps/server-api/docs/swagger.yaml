        type: string
    type: object
  dashboard.LiveAssignmentResponse:
    properties:
      assignmentId:
        type: integer
      assignmentTitle:
        type: string
      students:
        items:
          $ref: '#/definitions/dashboard.StudentLiveItem'
        type: array
      updatedAt:
        type: string
    type: object
  dashboard.StudentHistoryItem:
    properties:
      assignmentId:
        type: integer
      assignmentStatus:
        type: string
      assignmentTitle:
        type: string
      currentRoleName:
        type: string
      currentTarget:
        type: string
      hintCreatedAt:
        type: string
      hintProvider:
        type: string
