        items:
          type: string
        type: array
      categoryCounts:
        additionalProperties:
          type: integer
        type: object
      description:
        type: string
      extensions:
        items:
          type: string
        type: array
      goal:
        type: string
      id:
        type: integer
      listNames:
        items:
          type: string
        type: array
      roleNames:
        items:
          type: string
        type: array
      scriptCounts:
        additionalProperties:
          type: integer
        type: object
      status:
        type: string
      teachingPoints:
        items:
          type: string
        type: array
      title:
        type: string
      variableNames:
        items:
          type: string
        type: array
    type: object
  assignment.TeacherAssignmentDetail:
    properties:
      analysisStatus:
        type: string
      assignedStudents:
        items:
          $ref: '#/definitions/assignment.AssignmentStudentItem'
        type: array
      blockCounts:
        additionalProperties:
          type: integer
        type: object
      broadcastMessages:
        items:
          type: string
        type: array
      categoryCounts:
        additionalProperties:
          type: integer
        type: object
      description:
        type: string
      extensions:
        items:
          type: string
        type: array
      goal:
        type: string
      id:
        type: integer
      listNames:
        items:
          type: string
        type: array
      roleNames:
        items:
          type: string
        type: array
      scriptCounts:
        additionalProperties:
          type: integer
        type: object
      status:
        type: string
      teachingPoints:
        items:
          type: string
        type: array
      title:
        type: string
      updatedAt:
        type: string
      variableNames:
        items:
          type: string
        type: array
    type: object
  assignment.TeacherAssignmentItem:
    properties:
      analysisStatus:
        type: string
      description:
        type: string
      goal:
        type: string
      id:
        type: integer
      status:
        type: string
      studentCount:
        type: integer
      title:
        type: string
      updatedAt:
        type: string
    type: object
  auth.Session:
    properties:
      teacherName:
        type: string
